// ─── 4-5-4 CALENDAR ──────────────────────────────────────────
const PERIOD_WEEKS=[4,5,4,4,5,4,4,5,4,4,5,4];
const PERIOD_NAMES=["February","March","April","May","June","July","August","September","October","November","December","January"];
const QUARTER_LABELS=["Q1","Q1","Q1","Q2","Q2","Q2","Q3","Q3","Q3","Q4","Q4","Q4"];
const MABBR=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function getFYStart(fy){
  const feb1=new Date(fy,1,1),dow=feb1.getDay();
  const back=dow,fwd=(7-dow)%7,offset=back<=fwd?-back:fwd;
  const d=new Date(feb1);d.setDate(d.getDate()+offset);return d;
}
function getFiscalPeriods(fy){
  const start=getFYStart(fy),periods=[];let cur=new Date(start);
  for(let i=0;i<12;i++){
    const pStart=new Date(cur),days=PERIOD_WEEKS[i]*7,pEnd=new Date(cur);
    pEnd.setDate(pEnd.getDate()+days-1);
    periods.push({num:i+1,label:PERIOD_NAMES[i],quarter:QUARTER_LABELS[i],weeks:PERIOD_WEEKS[i],start:pStart,end:pEnd});
    cur.setDate(cur.getDate()+days);
  }
  return periods;
}
function getDatesForPeriod(fy,period){
  const p=getFiscalPeriods(fy)[period-1],dates=[],d=new Date(p.start);
  while(d<=p.end){dates.push(new Date(d));d.setDate(d.getDate()+1);}
  return dates;
}
function fmtDate(d){return `${d.getDate()}-${MABBR[d.getMonth()]}`;}
function fmtRange(p){return `${fmtDate(p.start)} – ${fmtDate(p.end)}`;}
function fmtC(v){return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD"}).format(parseFloat(v)||0);}
function vc(v){return v>0?"#4ade80":v<0?"#f87171":"#9ca3af";}
function getCurrentPeriod(){
  const now=new Date();
  for(let y=2025;y<=2027;y++){
    const ps=getFiscalPeriods(y);
    for(const p of ps){if(now>=p.start&&now<=p.end)return{fy:y,period:p.num};}
  }
  return{fy:2026,period:4};
}

// ─── AUTH ────────────────────────────────────────────────────
async function signIn(){
  try{
    const result=await msalInstance.loginPopup({scopes:["User.Read"]});
    const email=result.account.username.toLowerCase();
    const match=STORE_MAP[email];
    if(!match){
      showError(`Account ${email} is not mapped to a store. Contact your administrator.`);return;
    }
    if(match.isAdmin){renderApp(match,result.account.name);return;}
    if(Array.isArray(match)){showStorePicker(match,result.account.name);return;}
    renderApp(match,result.account.name);
  }catch(e){console.error(e);showError("Sign-in failed. Please try again.");}
}
msalInstance.handleRedirectPromise().then(result=>{
  if(result){
    const email=result.account.username.toLowerCase();
    const match=STORE_MAP[email];
    if(!match)return;
    if(match.isAdmin)renderApp(match,result.account.name);
    else if(Array.isArray(match))showStorePicker(match,result.account.name);
    else renderApp(match,result.account.name);
  }
});
function showError(msg){const el=document.getElementById("login-error");if(el){el.style.display="block";el.textContent=msg;}}

// ─── RENDER APP ──────────────────────────────────────────────
function renderApp(user,displayName){
  const{fy,period}=getCurrentPeriod();
  window._appState={user,displayName,fy,period};
  document.getElementById("app").innerHTML=`
    <div class="header">
      <div>
        <h1 style="font-size:16px;font-weight:700">⚓ ShopCGX ${user.isAdmin?"Admin Dashboard":"Sales Entry — "+user.name}</h1>
        <p style="font-size:11px;color:#aabbd0">Coast Guard Exchange · Daily Sales Reporting · ${displayName}</p>
      </div>
      <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap">
        <div>
          <div style="font-size:9px;color:#aabbd0;margin-bottom:2px">FISCAL YEAR</div>
          <select id="sel-fy" onchange="refreshView()" style="min-width:80px">
            ${[2025,2026,2027].map(y=>`<option value="${y}"${y===fy?" selected":""}>${y}</option>`).join("")}
          </select>
        </div>
        <div>
          <div style="font-size:9px;color:#aabbd0;margin-bottom:2px">PERIOD</div>
          <select id="sel-period" onchange="refreshView()" style="min-width:220px">
            ${getFiscalPeriods(fy).map(p=>`<option value="${p.num}"${p.num===period?" selected":""}>${p.quarter} · P${p.num} ${p.label} (${fmtRange(p)}, ${p.weeks}wk)</option>`).join("")}
          </select>
        </div>
        <div style="background:#21262d;border-radius:20px;padding:4px 12px;font-size:12px">👤 ${displayName}</div>
        <button class="btn" style="background:#21262d;color:#7d8590" onclick="location.reload()">Sign out</button>
      </div>
    </div>
    <div id="view-container"></div>`;
  refreshView();
}

function refreshView(){
  const{user,displayName}=window._appState;
  const fy=+document.getElementById("sel-fy").value;
  const period=+document.getElementById("sel-period").value;
  // Update period options when FY changes
  const pSel=document.getElementById("sel-period");
  if(pSel){
    const curP=+pSel.value;
    pSel.innerHTML=getFiscalPeriods(fy).map(p=>`<option value="${p.num}"${p.num===curP?" selected":""}>${p.quarter} · P${p.num} ${p.label} (${fmtRange(p)}, ${p.weeks}wk)</option>`).join("");
  }
  window._appState.fy=fy;window._appState.period=period;
  if(user.isAdmin)renderAdminView(fy,period);
  else renderStoreView(user,fy,period);
}

// ─── STORE VIEW ──────────────────────────────────────────────
function renderStoreView(user,fy,period){
  const store=STORES.find(s=>s.id===user.id);
  const pInfo=getFiscalPeriods(fy)[period-1];
  const dates=getDatesForPeriod(fy,period);
  const mKey=`fy${fy}-p${period}`;
  const sKey=`store:${user.id}:${mKey}`;
  const data=loadData(sKey);

// ─── LY/PLAN HELPERS ─────────────────────────────────────────
window._lyPlanBuffer={};
function updateLyPlan(storeId,ds,field,val,mKey){
  if(!window._lyPlanBuffer[storeId])window._lyPlanBuffer[storeId]={};
  if(!window._lyPlanBuffer[storeId][ds])window._lyPlanBuffer[storeId][ds]={};
  window._lyPlanBuffer[storeId][ds][field]=val;
}
function saveLyPlan(mKey){
  for(const[sid,days]of Object.entries(window._lyPlanBuffer||{})){
    const existing=loadData(`adm:${mKey}:${sid}`);
    for(const[ds,fields]of Object.entries(days)){existing[ds]={...(existing[ds]||{}),...fields};}
    saveData(`adm:${mKey}:${sid}`,existing);
  }
  window._lyPlanBuffer={};
  alert("LY & Plan saved!");
}

// ─── CHART HELPERS ───────────────────────────────────────────
function renderBarChart(storeCalc){
  const data=Object.entries(REGIONS).map(([rKey])=>{
    const rS=STORES.filter(s=>s.region===rKey);
    return{r:rKey.replace("Region ","R"),s:rS.reduce((a,s)=>a+storeCalc(s.id).tot,0),l:rS.reduce((a,s)=>a+storeCalc(s.id).ly,0)};
  });
  const max=Math.max(...data.map(d=>Math.max(d.s,d.l)),1);
  return data.map(d=>`

        <div style="flex:1;background:#60a5fa;border-radius:3px 3px 0 0;height:${(d.l/max*100)}%" title="LY: ${fmtC(d.l)}"></div>
      </div>
      <div style="font-size:10px;color:#7d8590">${d.r}</div>
    </div>`).join("");
}
function renderProgressBars(storeCalc,dates){
  return Object.entries(REGIONS).map(([rKey,rMgr])=>{
    const rS=STORES.filter(s=>s.region===rKey);
    const reporting=rS.filter(s=>storeCalc(s.id).days>0).length;

    return`<div style="margin-bottom:10px">

}

function handleImportFile(f){
  if(!f)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const wb=XLSX.read(e.target.result,{type:"array"});
    const ws=wb.Sheets[wb.SheetNames[0]];
    const data=XLSX.utils.sheet_to_json(ws,{raw:false,defval:""});
    if(!data.length)return;
    const hdrs=Object.keys(data[0]);
    const sc=hdrs.find(h=>/^store/i.test(h.trim()))||hdrs[0]||"";
    const dc=hdrs.find(h=>/date/i.test(h))||"";
    const lc=hdrs.find(h=>/retail\s*ty|sales\s*ty/i.test(h))||hdrs.find(h=>/\bty\b/i.test(h))||"";
    const pc=hdrs.find(h=>/retail\s*ly|sales\s*ly/i.test(h))||hdrs.find(h=>/\bly\b/i.test(h))||"";
    const dates=data.map(r=>parseImpDate(r[dc])).filter(Boolean);
    let srcInfo=null;
    for(let y=2023;y<=2026;y++){const ps=getFiscalPeriods(y);for(const p of ps){const inP=dates.filter(d=>d>=p.start&&d<=p.end);if(inP.length/dates.length>0.7){srcInfo={fy:y,period:p.num,info:p};break;}}}
    window._importState={...window._importState,rows:data,headers:hdrs,storeCol:sc,dateCol:dc,lyCol:lc,planCol:pc,srcInfo,result:null};
    if(srcInfo){window._importState.tgtFy=srcInfo.fy+1;window._importState.tgtPeriod=srcInfo.period;}
    setAdminTab("import");
  };
  reader.readAsArrayBuffer(f);
}

function parseImpDate(v){
  if(!v)return null;
  const s=String(v).trim();
  const iso=s.match(/^(\d{4})[\/\-](\d{2})[\/\-](\d{2})$/);
  if(iso)return new Date(+iso[1],+iso[2]-1,+iso[3]);
  const us=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(us)return new Date(+us[3],+us[1]-1,+us[2]);
  const d=new Date(s);return isNaN(d)?null:d;
}
function parseImpVal(v){
  if(!v&&v!==0)return 0;
  const s=String(v).trim(),neg=s.startsWith("(")||s.startsWith("-");
  return neg?-(parseFloat(s.replace(/[()\-$,\s]/g,""))||0):(parseFloat(s.replace(/[$,\s]/g,""))||0);
}

function doImport(){
  const st=window._importState;
  const targetDates=getDatesForPeriod(st.tgtFy,st.tgtPeriod);
  const mKey=`fy${st.tgtFy}-p${st.tgtPeriod}`;
  const byStore={};
  for(const row of st.rows){
    const storeRaw=String(row[st.storeCol]||"").trim();
    const storeId=storeRaw.split(/[\s\-]/)[0].replace(/\D/g,"");
    const store=STORES.find(s=>s.id===storeId);if(!store)continue;
    const date=parseImpDate(row[st.dateCol]);if(!date)continue;
    if(!byStore[store.id])byStore[store.id]=[];
    byStore[store.id].push({date,ly:parseImpVal(row[st.lyCol]),plan:parseImpVal(row[st.planCol])});
  }
  for(const sid of Object.keys(byStore))byStore[sid].sort((a,b)=>a.date-b.date);
  let matched=0,skipped=0;const saveD={};
  for(const[sid,srows]of Object.entries(byStore)){
    saveD[sid]={};
    srows.forEach((row,i)=>{
      const td=targetDates[i];if(!td){skipped++;return;}
      saveD[sid][fmtDate(td)]={ly:row.ly,plan:row.plan};matched++;
    });
  }
  for(const[sid,data]of Object.entries(saveD))saveData(`adm:${mKey}:${sid}`,data);
  window._importState.result={matched,skipped,stores:Object.keys(saveD).length,storeNames:Object.keys(saveD).map(id=>STORES.find(s=>s.id===id)?.name).filter(Boolean)};
  setAdminTab("import");
}
