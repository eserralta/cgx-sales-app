// ─── 4-5-4 RETAIL CALENDAR ──────────────────────────────────────
const PERIOD_WEEKS = [4,5,4,4,5,4,4,5,4,4,5,4];
const PERIOD_NAMES = ["February","March","April","May","June","July","August","September","October","November","December","January"];
const QUARTER_LABELS = ["Q1","Q1","Q1","Q2","Q2","Q2","Q3","Q3","Q3","Q4","Q4","Q4"];
const MABBR = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function getFYStart(fy) {
  const feb1 = new Date(fy, 1, 1);
  const dow = feb1.getDay();
  const back = dow;
  const fwd = (7 - dow) % 7;
  const offset = back <= fwd ? -back : fwd;
  const d = new Date(feb1);
  d.setDate(d.getDate() + offset);
  return d;
}

function getFiscalPeriods(fy) {
  const start = getFYStart(fy), periods = [];
  let cur = new Date(start);
  for (let i = 0; i < 12; i++) {
    const pStart = new Date(cur), days = PERIOD_WEEKS[i] * 7;
    const pEnd = new Date(cur);
    pEnd.setDate(pEnd.getDate() + days - 1);
    periods.push({ num: i+1, label: PERIOD_NAMES[i], quarter: QUARTER_LABELS[i], weeks: PERIOD_WEEKS[i], start: pStart, end: pEnd });
    cur.setDate(cur.getDate() + days);
  }
  return periods;
}

function getDatesForPeriod(fy, period) {
  const p = getFiscalPeriods(fy)[period - 1];
  const dates = [], d = new Date(p.start);
  while (d <= p.end) { dates.push(new Date(d)); d.setDate(d.getDate() + 1); }
  return dates;
}

function fmtDate(d) { return `${d.getDate()}-${MABBR[d.getMonth()]}`; }
function fmtRange(p) { return `${fmtDate(p.start)} – ${fmtDate(p.end)}`; }
function fmtC(v) { return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD"}).format(parseFloat(v)||0); }
function vc(v) { return v > 0 ? "#4ade80" : v < 0 ? "#f87171" : "#9ca3af"; }

// ─── AUTH ────────────────────────────────────────────────────────
async function signIn() {
  try {
    const result = await msalInstance.loginPopup({ scopes: ["User.Read"] });
    const email = result.account.username.toLowerCase();
    const match = STORE_MAP[email];
    if (!match) {
      document.getElementById("login-error").style.display = "block";
      document.getElementById("login-error").textContent = `Account ${email} is not mapped to a store. Contact your administrator.`;
      return;
    }
    if (match.isAdmin) { renderApp(match, result.account.name); return; }
    if (Array.isArray(match)) { showStorePicker(match, result.account.name); return; }
    renderApp(match, result.account.name);
  } catch(e) {
    console.error(e);
    document.getElementById("login-error").style.display = "block";
    document.getElementById("login-error").textContent = "Sign-in failed. Please try again.";
  }
}

msalInstance.handleRedirectPromise().then(result => {
  if (result) {
    const email = result.account.username.toLowerCase();
    const match = STORE_MAP[email];
    if (match) {
      if (match.isAdmin) renderApp(match, result.account.name);
      else if (Array.isArray(match)) showStorePicker(match, result.account.name);
      else renderApp(match, result.account.name);
    }
  }
});

function showStorePicker(stores, displayName) {
  document.getElementById("app").innerHTML = `

            style="display:block;width:100%;background:#1c2333;border:1px solid #21262d;border-radius:6px;
            padding:12px;color:#e6edf3;font-size:14px;cursor:pointer;margin-bottom:8px;text-align:left;">
            🏪 ${s.name}
          </button>`).join("")}
      </div>
    </div>`;
}

// ─── HELPERS ─────────────────────────────────────────────────────
function getCurrentFiscalPeriod() {
  const now = new Date();
  for (let y = 2025; y <= 2027; y++) {
    const ps = getFiscalPeriods(y);
    for (const p of ps) { if (now >= p.start && now <= p.end) return { fy: y, period: p.num }; }
  }
  return { fy: 2026, period: 1 };
}

// ─── RENDER APP ───────────────────────────────────────────────────
function renderApp(user, displayName) {
  const { fy, period } = getCurrentFiscalPeriod();
  const periods = getFiscalPeriods(fy);

  document.getElementById("app").innerHTML = `
    <div class="header">
      <div>
        <h1>⚓ ShopCGX ${user.isAdmin ? "Admin Dashboard" : "Sales Entry — " + user.name}</h1>
        <p>Coast Guard Exchange · Daily Sales Reporting · ${displayName}</p>
      </div>
      <div style="display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;">
        <div>
          <div style="font-size:9px;color:#aabbd0;margin-bottom:2px">FISCAL YEAR</div>
          <select id="sel-fy" onchange="refreshView('${user.id}','${displayName}',${JSON.stringify(user)})" style="min-width:80px">
            ${[2025,2026,2027].map(y=>`<option value="${y}" ${y===fy?"selected":""}>${y}</option>`).join("")}
          </select>
        </div>
        <div>
          <div style="font-size:9px;color:#aabbd0;margin-bottom:2px">PERIOD</div>
          <select id="sel-period" onchange="refreshView('${user.id}','${displayName}',${JSON.stringify(user)})" style="min-width:220px">
            ${periods.map(p=>`<option value="${p.num}" ${p.num===period?"selected":""}>${p.quarter} · P${p.num} ${p.label} (${fmtRange(p)}, ${p.weeks}wk)</option>`).join("")}
          </select>
        </div>
        <div class="user-badge">👤 ${displayName}</div>
        <button class="btn" style="background:#21262d;color:#7d8590" onclick="location.reload()">Sign out</button>
      </div>
    </div>
    <div id="view-container"></div>
  `;
  refreshView(user.id, displayName, user);
}

// ─── REFRESH VIEW ─────────────────────────────────────────────────
async function refreshView(storeId, displayName, user) {
  if (typeof user === "string") user = JSON.parse(user);
  const fy     = +document.getElementById("sel-fy").value;
  const period = +document.getElementById("sel-period").value;
  const periods = getFiscalPeriods(fy);
  const pInfo   = periods[period - 1];
  const dates   = getDatesForPeriod(fy, period);
  const mKey    = `fy${fy}-p${period}`;
  const sKey    = `store:${storeId}:${mKey}`;

  // Load data from sessionStorage (replace with SharePoint List API for production)
  const raw  = sessionStorage.getItem(sKey);
  const data = raw ? JSON.parse(raw) : {};
  const admRaw  = sessionStorage.getItem(`adm:${mKey}:${storeId}`);
  const admData = admRaw ? JSON.parse(admRaw) : {};

  if (user.isAdmin) {
    renderAdminView(user, displayName, dates, mKey, pInfo, fy, period);
  } else {
    renderStoreView(user, displayName, dates, mKey, sKey, pInfo, data, admData, fy, period);
  }
}

// ─── STORE VIEW ───────────────────────────────────────────────────
function renderStoreView(user, displayName, dates, mKey, sKey, pInfo, data, admData, fy, period) {
  const calc = ds => {
    const r=data[ds]||{}, a=admData[ds]||{};
    const ss=parseFloat(r.ss)||0, cx=parseFloat(r.cx)||0, gs=parseFloat(r.gs)||0, tot=ss+cx;
    const ly=parseFloat(a.ly)||0, plan=parseFloat(a.plan)||0;
    return {ss,cx,gs,tot,totG:tot+gs,ly,plan,vLY:tot-ly,vPlan:tot-plan};
  };
  const T = dates.reduce((a,d)=>{
    const c=calc(fmtDate(d));
    return {ss:a.ss+c.ss,cx:a.cx+c.cx,tot:a.tot+c.tot,gs:a.gs+c.gs,totG:a.totG+c.totG,
      ly:a.ly+c.ly,plan:a.plan+c.plan,vLY:a.vLY+c.vLY,vPlan:a.vPlan+c.vPlan};
  },{ss:0,cx:0,tot:0,gs:0,totG:0,ly:0,plan:0,vLY:0,vPlan:0});

  document.getElementById("view-container").innerHTML = `
    <div class="kpi-strip">
      <div class="kpi"><label>PTD SALES</label><span class="pos">${fmtC(T.tot)}</span></div>
      <div class="kpi"><label>PTD PLAN</label><span style="color:#fbbf24">${T.plan>0?fmtC(T.plan):"—"}</span></div>
      <div class="kpi"><label>VAR TO PLAN</label><span style="color:${vc(T.vPlan)}">${T.plan>0?fmtC(T.vPlan):"—"}</span></div>
      <div class="kpi"><label>PTD LY</label><span style="color:#60a5fa">${T.ly>0?fmtC(T.ly):"—"}</span></div>
      <div class="kpi"><label>VAR TO LY</label><span style="color:${vc(T.vLY)}">${T.ly>0?fmtC(T.vLY):"—"}</span></div>
      <div class="kpi"><label>DAYS ENTERED</label><span style="color:#7d8590">${dates.filter(d=>calc(fmtDate(d)).tot>0).length}/${dates.length}</span></div>
      <div style="margin-left:auto;display:flex;align-items:center;">
        <button class="btn" id="save-btn" style="background:#CC0000" onclick="saveData('${sKey}')">💾 Save</button>
      </div>
    </div>
    <div style="overflow-x:auto">
    <table>
      <thead><tr style="background:#0e1e50">
        <th style="text-align:left">Date</th>
        <th style="text-align:right">Store Sales</th>
        <th style="text-align:right">CGXpress</th>
        <th style="text-align:right">Total Sales</th>
        <th style="text-align:right">Plan</th>
        <th style="text-align:right">LY Sales</th>
        <th style="text-align:right">Var to LY</th>
        <th style="text-align:right">Var to Plan</th>
        <th style="text-align:right">Gas Sales</th>
        <th style="text-align:right">Total w/Gas</th>
        <th style="text-align:left;min-width:160px">Anomalies / Comments</th>
        <th style="text-align:right">Txn #</th>
      </tr></thead>
      <tbody>
        ${dates.map((d,i)=>{
          const ds=fmtDate(d), r=data[ds]||{}, c=calc(ds);
          const wk=d.getDay()===0||d.getDay()===6;
          const dayNum=Math.floor((d-pInfo.start)/(1000*60*60*24));
          const weekStart=dayNum%7===0;
          return `<tr style="background:${wk?"#1a1c30":i%2===0?"#161b22":"#1c2333"};border-bottom:${weekStart&&i>0?"2px solid #2a3a5a":"1px solid #21262d"}">
            <td style="padding:3px 8px;font-weight:600;white-space:nowrap;color:${wk?"#818cf8":"#e6edf3"}">${ds}${weekStart&&i>0?`<span style="font-size:9px;color:#7d8590;margin-left:4px">W${Math.floor(dayNum/7)+1}</span>`:""}</td>
            <td><input type="number" value="${r.ss||""}" onchange="updateField('${ds}','ss',this.value)" placeholder="0.00" style="width:90px"></td>
            <td><input type="number" value="${r.cx||""}" onchange="updateField('${ds}','cx',this.value)" placeholder="0.00" style="width:80px"></td>
            <td style="text-align:right;color:${c.tot>0?"#4ade80":"#4b5563"}">${fmtC(c.tot)}</td>
            <td style="text-align:right;color:#fbbf24">${c.plan>0?fmtC(c.plan):"<span style='color:#374151'>—</span>"}</td>
            <td style="text-align:right;color:#60a5fa">${c.ly>0?fmtC(c.ly):"<span style='color:#374151'>—</span>"}</td>
            <td style="text-align:right;color:${vc(c.vLY)}">${c.ly>0?fmtC(c.vLY):"<span style='color:#374151'>—</span>"}</td>
            <td style="text-align:right;color:${vc(c.vPlan)}">${c.plan>0?fmtC(c.vPlan):"<span style='color:#374151'>—</span>"}</td>
            <td><input type="number" value="${r.gs||""}" onchange="updateField('${ds}','gs',this.value)" placeholder="0.00" style="width:80px"></td>
            <td style="text-align:right;color:#67e8f9">${fmtC(c.totG)}</td>
            <td><input type="text" class="note" value="${r.notes||""}" onchange="updateField('${ds}','notes',this.value)" placeholder="Notes, anomalies..."></td>
            <td><input type="number" value="${r.txn||""}" onchange="updateField('${ds}','txn',this.value)" placeholder="0" style="width:55px"></td>
          </tr>`;
        }).join("")}
      </tbody>
      <tfoot><tr>
        <td style="padding:7px 8px;color:#CC0000;font-weight:800">TOTALS</td>
        <td style="text-align:right;color:#4ade80;padding:7px 6px">${fmtC(T.ss)}</td>
        <td style="text-align:right;color:#4ade80;padding:7px 6px">${fmtC(T.cx)}</td>
        <td style="text-align:right;color:#4ade80;padding:7px 6px">${fmtC(T.tot)}</td>
        <td style="text-align:right;color:#fbbf24;padding:7px 6px">${fmtC(T.plan)}</td>
        <td style="text-align:right;color:#60a5fa;padding:7px 6px">${fmtC(T.ly)}</td>
        <td style="text-align:right;padding:7px 6px;color:${vc(T.vLY)}">${fmtC(T.vLY)}</td>
        <td style="text-align:right;padding:7px 6px;color:${vc(T.vPlan)}">${fmtC(T.vPlan)}</td>
        <td style="text-align:right;color:#67e8f9;padding:7px 6px">${fmtC(T.gs)}</td>
        <td style="text-align:right;color:#67e8f9;padding:7px 6px">${fmtC(T.totG)}</td>
        <td colspan="2"></td>
      </tr></tfoot>
    </table>
    </div>`;

  window._currentSKey = sKey;
  window._editBuffer  = {};
}

function updateField(ds, field, val) {
  if (!window._editBuffer) window._editBuffer = {};
  if (!window._editBuffer[ds]) window._editBuffer[ds] = {};
  window._editBuffer[ds][field] = val;
}

async function saveData(sKey) {
  const btn = document.getElementById("save-btn");
  btn.textContent = "Saving...";
  const existing = JSON.parse(sessionStorage.getItem(sKey)||"{}");
  for (const [ds, fields] of Object.entries(window._editBuffer||{})) {
    existing[ds] = { ...(existing[ds]||{}), ...fields };
  }
  sessionStorage.setItem(sKey, JSON.stringify(existing));
  // TODO: Replace sessionStorage with SharePoint List POST via Graph API
  window._editBuffer = {};
  btn.textContent = "✓ Saved!";
  btn.style.background = "#166534";
  setTimeout(()=>{ btn.textContent="💾 Save"; btn.style.background="#CC0000"; }, 2500);
}

        <p style="font-size:16px;color:#e6edf3;margin-bottom:8px">✅ Azure AD Login Working</p>
        <p>Welcome, <strong style="color:#fbbf24">${displayName}</strong> — Admin access confirmed.</p>

      </div>

}
</script>
